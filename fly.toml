app = "veena-music-academy"
primary_region = "maa"  # Chennai, closest to India

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "veena_data"
  destination = "/app/server/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
