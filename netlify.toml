# Netlify build config for the VidyaSetu frontend.
# The backend runs on Catalyst; Netlify PROXIES /api/* to it (below) so the
# browser makes same-origin requests — no CORS/preflight (Catalyst answers
# OPTIONS preflights itself without CORS headers, so we sidestep it entirely).
#
# Set these environment variables in the Netlify UI (Site config → Environment):
#   API_BASE            = /api                        (same-origin; proxied below)
#   SUPABASE_URL        = https://<your-ref>.supabase.co
#   SUPABASE_ANON_KEY   = <anon public key>
# PUBLIC_URL is forced to "/" by the build:netlify script.

[build]
  base = "client"
  command = "npm run build:netlify"
  publish = "dist"

# Proxy API calls to the Catalyst backend, server-side. Because the browser
# only ever talks to this same Netlify origin, there is no cross-origin
# preflight. Netlify forwards the request (incl. the Authorization header) to
# Catalyst. MUST come before the SPA fallback.
[[redirects]]
  from = "/api/*"
  # DEVELOPMENT backend (has the X-Auth-Token fix + verified working). Once the
  # Production promote succeeds, change ".development." out of this URL to switch
  # to the production backend.
  to = "https://academy-management-928044659.development.catalystserverless.com/server/api/api/:splat"
  status = 200
  force = true

# SPA fallback: real files (landing.html, assets) are served directly; any
# other path falls through to the React app so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
